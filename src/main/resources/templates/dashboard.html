<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lucrezia - Dashboard AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://use.fontawesome.com/releases/v6.5.0/js/all.js" crossorigin="anonymous"></script>

	<link href="https://cdn.jsdelivr.net/npm/startbootstrap-sb-admin@7.0.7/dist/css/styles.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>

<body class="sb-nav-fixed">

<nav class="sb-topnav navbar navbar-expand navbar-dark topbar-ai">
    <a class="navbar-brand ps-3 fw-bold" href="/dashboard">
        Nexus Domus
    </a>

    <button class="btn btn-link btn-sm order-1 order-lg-0 me-4 me-lg-0 text-white"
            id="sidebarToggle">
        <i class="fas fa-bars"></i>
    </button>

    <div class="ms-auto me-3 text-white small d-none d-md-block">
        powered by Lucrezia AI
    </div>
</nav>

<div id="layoutSidenav">

    <div id="layoutSidenav_nav">
        <nav class="sb-sidenav accordion sidebar-ai" id="sidenavAccordion">

            <div class="sb-sidenav-menu">
                <div class="nav">

                    <div class="brand-ai px-3 mt-3 mb-3">
                        <div class="brand-icon">
                            <i class="fa-solid fa-building-user"></i>
                        </div>
                        <div>
                            <h5>Nexus Domus</h5>
                            <span>Gestionale AI</span>
                        </div>
                    </div>

                    <div class="user-panel mx-3 mb-3">
                        <div class="d-flex align-items-center mb-3">
                            <div class="user-avatar">
                                <i class="fa-solid fa-user"></i>
                            </div>

                            <div class="ms-3">
                                <div class="small text-secondary">Accesso come</div>
                                <div class="fw-bold text-white" th:text="${adminName}">Renato</div>
                            </div>
                        </div>

                        <label class="condominio-label">Condominio</label>
                        <select class="form-select condominio-select">
                            <option selected>Tutti</option>
                            <option>Via Europa</option>
                            <option>Via Puglia</option>
                        </select>
                    </div>

                    <div class="sb-sidenav-menu-heading">Operatività</div>

                    <a class="nav-link active" href="/dashboard">
                        <div class="sb-nav-link-icon"><i class="fa-solid fa-gauge-high"></i></div>
                        Dashboard
                    </a>

                    <a class="nav-link" href="/dashboard/assistente">
                        <div class="sb-nav-link-icon"><i class="fa-solid fa-robot"></i></div>
                        Lucrezia AI
                    </a>

                    <a class="nav-link" href="/dashboard/ticket">
                        <div class="sb-nav-link-icon"><i class="fa-solid fa-ticket"></i></div>
                        Ticket
                    </a>

                    <a class="nav-link" href="/dashboard/fornitori">
                        <div class="sb-nav-link-icon"><i class="fa-solid fa-users-gear"></i></div>
                        Fornitori
                    </a>

                    <a class="nav-link" href="/dashboard/condomini">
                        <div class="sb-nav-link-icon"><i class="fa-solid fa-building"></i></div>
                        Condomini
                    </a>

                    <a class="nav-link" href="/dashboard/documenti">
                        <div class="sb-nav-link-icon"><i class="fa-solid fa-folder-open"></i></div>
                        Documenti
                    </a>

                    <div class="sb-sidenav-menu-heading">Sistema</div>

                    <a class="nav-link" href="/dashboard/impostazioni">
                        <div class="sb-nav-link-icon"><i class="fa-solid fa-gear"></i></div>
                        Impostazioni
                    </a>

                </div>
            </div>

        </nav>
    </div>

    <div id="layoutSidenav_content">

        <main class="main-ai">

<div class="brand-ai">
            <div class="brand-icon">
                <i class="fa-solid fa-building-user"></i>
            </div>
            <div>
                <h4>Nexus Domus</h4>
                <span>powered by Lucrezia</span>
            </div>
        </div>

        <div class="user-panel">
            <div class="d-flex align-items-center mb-3">
                <div class="user-avatar">
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="ms-3">
                    <div class="small text-secondary">Accesso come</div>
                    <div class="fw-bold text-white" th:text="${adminName}">Renato</div>
                </div>
            </div>

            <label class="condominio-label">Condominio</label>
            <select class="form-select condominio-select">
                <option selected>Tutti</option>
                <option>Via Europa</option>
                <option>Via Puglia</option>
            </select>
        </div>

        <nav class="menu-ai">
            <a class="active" href="/dashboard">
                <i class="fa-solid fa-gauge-high"></i>
                Dashboard
            </a>
            <a href="#">
                <i class="fa-solid fa-robot"></i>
                Lucrezia AI
            </a>
            <a href="#">
                <i class="fa-solid fa-ticket"></i>
                Ticket
            </a>
            <a href="#">
                <i class="fa-solid fa-users-gear"></i>
                Fornitori
            </a>
            <a href="#">
                <i class="fa-solid fa-building"></i>
                Condomini
            </a>
            <a href="#">
                <i class="fa-solid fa-folder-open"></i>
                Documenti
            </a>
            <a href="#">
                <i class="fa-solid fa-gear"></i>
                Impostazioni
            </a>
        </nav>

        </main>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/startbootstrap-sb-admin@7.0.7/dist/js/scripts.js"></script>
</body>
</html>
